<svg viewBox="0 0 1400 760" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="1400" height="760" fill="#ffffff"/>

  <!-- Title -->
  <text x="700" y="45" text-anchor="middle" font-size="26" font-weight="bold" fill="#14181C">Office Monitor — System Architecture</text>

  <!-- Row 1: Device States -->
  <rect x="80" y="100" width="260" height="90" rx="10" fill="#FFF4E0" stroke="#F5A623" stroke-width="2"/>
  <text x="210" y="135" text-anchor="middle" font-size="16" font-weight="bold" fill="#7a4a00">Device States</text>
  <text x="210" y="158" text-anchor="middle" font-size="13" fill="#5c5c5c">2 Fans + 3 Lights</text>
  <text x="210" y="176" text-anchor="middle" font-size="13" fill="#5c5c5c">per room (ON / OFF)</text>

  <!-- Arrow 1 -->
  <line x1="340" y1="145" x2="440" y2="145" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 1: Simulated Data Layer -->
  <rect x="440" y="100" width="280" height="90" rx="10" fill="#E9F2FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="580" y="130" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e3a8a">Simulated Data Layer</text>
  <text x="580" y="152" text-anchor="middle" font-size="13" fill="#5c5c5c">simulator.js — setInterval</text>
  <text x="580" y="170" text-anchor="middle" font-size="13" fill="#5c5c5c">randomly toggles devices every 5s</text>

  <!-- Arrow down to Backend -->
  <line x1="580" y1="190" x2="580" y2="260" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Backend / Source of Truth -->
  <rect x="380" y="260" width="400" height="130" rx="10" fill="#14181C" stroke="#F5A623" stroke-width="3"/>
  <text x="580" y="295" text-anchor="middle" font-size="18" font-weight="bold" fill="#F5A623">Backend — Node.js + Express</text>
  <text x="580" y="320" text-anchor="middle" font-size="13" fill="#e5e7eb">deviceStore.js (in-memory) = Single Source of Truth</text>
  <text x="580" y="340" text-anchor="middle" font-size="13" fill="#e5e7eb">Socket.io server · REST API (/api/*) · alertEngine.js</text>
  <text x="580" y="365" text-anchor="middle" font-size="12" fill="#9ca3af">Both dashboard and bot read the SAME state</text>

  <!-- Arrows branching down to Dashboard and Bot -->
  <line x1="480" y1="390" x2="270" y2="460" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="680" y1="390" x2="900" y2="460" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="330" y="430" font-size="12" fill="#6b7280" font-style="italic">Socket.io (real-time push)</text>
  <text x="820" y="430" font-size="12" fill="#6b7280" font-style="italic">direct function call (same process)</text>

  <!-- Web Dashboard -->
  <rect x="80" y="460" width="320" height="120" rx="10" fill="#EAFBF3" stroke="#10B981" stroke-width="2"/>
  <text x="240" y="495" text-anchor="middle" font-size="16" font-weight="bold" fill="#065f46">Web Dashboard</text>
  <text x="240" y="518" text-anchor="middle" font-size="13" fill="#5c5c5c">React + Tailwind + Framer Motion</text>
  <text x="240" y="538" text-anchor="middle" font-size="13" fill="#5c5c5c">Live device panel · power meter</text>
  <text x="240" y="556" text-anchor="middle" font-size="13" fill="#5c5c5c">alerts panel (via socket.io-client)</text>

  <!-- Discord Bot -->
  <rect x="740" y="460" width="320" height="120" rx="10" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="2"/>
  <text x="900" y="495" text-anchor="middle" font-size="16" font-weight="bold" fill="#5b21b6">Discord Bot</text>
  <text x="900" y="518" text-anchor="middle" font-size="13" fill="#5c5c5c">discord.js — !status !room !usage</text>
  <text x="900" y="538" text-anchor="middle" font-size="13" fill="#5c5c5c">raw data → Groq LLM (Llama 3.3)</text>
  <text x="900" y="556" text-anchor="middle" font-size="13" fill="#5c5c5c">→ humanized friendly reply</text>

  <!-- Arrows down to User -->
  <line x1="240" y1="580" x2="500" y2="660" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="900" y1="580" x2="620" y2="660" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="330" y="625" font-size="12" fill="#6b7280" font-style="italic">Live browser view</text>
  <text x="740" y="625" font-size="12" fill="#6b7280" font-style="italic">Discord message reply</text>

  <!-- User -->
  <rect x="480" y="660" width="220" height="70" rx="10" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="590" y="702" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">User (the Boss)</text>

  <!-- Bonus: proactive alert note -->
  <rect x="1080" y="260" width="260" height="90" rx="10" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="1210" y="288" text-anchor="middle" font-size="13" font-weight="bold" fill="#9a3412">Bonus: Proactive Alerts</text>
  <text x="1210" y="308" text-anchor="middle" font-size="12" fill="#5c5c5c">alertEngine.js detects after-hours /</text>
  <text x="1210" y="325" text-anchor="middle" font-size="12" fill="#5c5c5c">2hr-continuous-on → bot auto-posts</text>
  <text x="1210" y="342" text-anchor="middle" font-size="12" fill="#5c5c5c">to Discord channel every 30s</text>
  <line x1="1080" y1="305" x2="785" y2="305" stroke="#F97316" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#333"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#F97316"/>
    </marker>
  </defs>
</svg>
